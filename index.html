<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASJID JAMI AL IKHLASH</title>
    <style>
        /* Mengatur agar halaman web penuh dan tidak ada scrollbar ganda */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Container utama pembungkus desain Canva */
        .web-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Mengatur agar iframe Canva memenuhi seluruh layar browser */
        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="web-container">
        <!-- Kode Embed Canva Masjid Jami Al-Ikhlash -->
        <iframe loading="lazy" src="https://www.canva.com/design/DAHJwvktMY4/UNntTaW9BSH74SgvAq9f_Q/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
    </div>

</body>
</html>
